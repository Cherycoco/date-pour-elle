<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Une petite question ❤️</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="bg"></div>
<div class="overlay"></div>

<div class="card" id="intro">
<h3>Une petite surprise...</h3>
<h1>J'ai une question à te poser ❤️</h1>
<p>Prends ton temps... mais choisis bien 😉</p>

<div class="buttons">
<button id="yes">Oui ❤️</button>
<button id="no">Non 🥺</button>
</div>
<p class="hint">🎵 Prépare "Follow You" de Bring Me The Horizon sur Spotify avant de répondre.</p>
</div>

<div id="success" class="hidden">
<h1>🥹 Merci ❤️</h1>
<p>Tu viens de faire sourire quelqu'un.</p>
<p>J'ai vraiment hâte qu'on partage ce moment ensemble 🌹</p>
</div>

<script src="script.js"></script>
</body>
</html>
