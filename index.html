<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Une petite invitation ❤️</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

</head>
<body>

<div class="background">
    <div class="blob blob1"></div>
    <div class="blob blob2"></div>
    <div class="blob blob3"></div>
</div>

<div id="hearts"></div>

<main>

    <!-- INTRO -->
    <section id="intro" class="card active">

        <div class="photo-container">
            <img src="photo.jpg" alt="Photo">
        </div>

        <h1>J'ai une question... ❤️</h1>

        <p class="subtitle">
            Promis, ça ne prend que quelques secondes.
        </p>

        <button id="startBtn" class="primary-btn">
            Découvrir
        </button>

    </section>


    <!-- QUESTION -->
    <section id="question" class="card">

        <h2>Est-ce que tu accepterais cette invitation ? 🥹</h2>

        <p class="question-text">
            J'aimerais passer un bon moment avec toi.
        </p>

        <div class="buttons">

            <button id="yesBtn" class="yes">
                Oui ❤️
            </button>

            <button id="noBtn" class="no">
                Non 🙄
            </button>

        </div>

    </section>



    <!-- CHOIX -->
    <section id="planning" class="card">

        <h2>Parfait ! 😍</h2>

        <p class="subtitle">
            Choisissons maintenant les détails.
        </p>

        <div class="form-group">

            <label>Quel jour ?</label>

            <select id="day">

                <option>Vendredi</option>
                <option>Samedi</option>
                <option>Dimanche</option>

            </select>

        </div>

        <div class="form-group">

            <label>À quelle heure ?</label>

            <select id="hour">

                <option>18h00</option>
                <option>19h00</option>
                <option>20h00</option>
                <option>21h00</option>

            </select>

        </div>


        <div class="form-group">

            <label>Quelle activité ?</label>

            <select id="activity">

                <option>🍣 Restaurant japonais</option>
                <option>🍕 Pizza</option>
                <option>🍔 Burger</option>
                <option>🍹 Boire un verre</option>
                <option>🎬 Cinéma</option>
                <option>🌅 Balade</option>
                <option>🎳 Bowling</option>
                <option>🎡 Surprise...</option>

            </select>

        </div>

        <button id="confirmBtn" class="primary-btn">
            Valider ❤️
        </button>

    </section>



    <!-- FIN -->
    <section id="success" class="card">

        <div class="emoji">
            🥳
        </div>

        <h2>Génial !!</h2>

        <p id="summary"></p>

        <div class="big-heart">
            ❤️
        </div>

    </section>

</main>



<!-- Popup -->

<div id="popup" class="popup">

    <div class="popup-content">

        <h3 id="popupTitle"></h3>

        <p id="popupText"></p>

        <button id="popupBtn">
            Continuer 😅
        </button>

    </div>

</div>



<!-- Confettis -->

<canvas id="confetti"></canvas>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<script src="script.js"></script>

</body>
</html>
